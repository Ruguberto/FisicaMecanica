  &lt;script&gt;
  (()=&gt;{

    function stage(){const a=samples(),xs=a.map(d=&gt;d.x),lo=Math.min(...xs),hi=Math.max(...xs),span=Math.max(1,hi-lo),min=lo-span*.08,max=hi+span*.08,s=at(time);e.object.style.left=`calc(26px + (100% - 52px) * ${(s.x-min)/(max-min)})`;e.objectLabel.textContent=`${fmt(s.x,1)} m`;e.ticks.innerHTML=&#x27;&#x27;;for(let i=0;i&lt;5;i++){const x=document.createElement(&#x27;span&#x27;);x.className=&#x27;mh-tick&#x27;;x.innerHTML=`&lt;span class=&quot;text-small&quot;&gt;${fmt(min+(max-min)*i/4,1)} m&lt;/span&gt;`;e.ticks.appendChild(x)}}
