<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Laboratorio MRUA sobre mesa</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#101827;font-family:system-ui}.top{position:fixed;z-index:3;top:8px;left:8px;right:8px;padding:9px;border-radius:9px;background:#0f172ad9;color:#fff;text-align:center;font-size:13px}.row{margin-top:7px}.row button{padding:6px 10px;margin:2px;border:1px solid #94a3b8;border-radius:6px;background:#1e293b;color:#fff}.row button.active,.row button.go{background:#38bdf8;color:#082f49}[hidden]{display:none}</style><script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"}}</script></head><body><div class="top"><div id="status">Cargando laboratorio…</div><div class="row"><button data-s=".65">Pequeño</button><button data-s="1" class="active">Mediano</button><button data-s="1.4">Grande</button></div><div class="row" id="motion" hidden><button id="play" class="go">Iniciar</button><button id="pause">Detener</button><button id="replace">Reubicar</button></div></div><script type="module">
import*as THREE from'three';import{ARButton}from'three/addons/webxr/ARButton.js';import{GLTFLoader}from'three/addons/loaders/GLTFLoader.js';const statusEl=document.getElementById('status'),motion=document.getElementById('motion'),play=document.getElementById('play'),pause=document.getElementById('pause'),replace=document.getElementById('replace'),scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.01,20),renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(devicePixelRatio);renderer.xr.enabled=true;renderer.shadowMap.enabled=false;document.body.appendChild(renderer.domElement);document.body.appendChild(ARButton.createButton(renderer,{requiredFeatures:['hit-test'],optionalFeatures:['dom-overlay'],domOverlay:{root:document.body}}));scene.add(new THREE.HemisphereLight(0xffffff,0x555555,3));const reticle=new THREE.Mesh(new THREE.RingGeometry(.08,.105,32).rotateX(-Math.PI/2),new THREE.MeshBasicMaterial({color:0x38bdf8}));reticle.matrixAutoUpdate=false;reticle.visible=false;scene.add(reticle);const lab=new THREE.Group();lab.visible=false;scene.add(lab);const road=new THREE.Mesh(new THREE.PlaneGeometry(1.4,.38),new THREE.MeshBasicMaterial({color:0x27313c,transparent:true,opacity:.88,side:THREE.DoubleSide}));road.rotation.x=-Math.PI/2;road.position.y=.002;lab.add(road);for(const z of[-.17,.17]){const edge=new THREE.Mesh(new THREE.BoxGeometry(1.4,.008,.018),new THREE.MeshBasicMaterial({color:0xffffff}));edge.position.set(0,.008,z);lab.add(edge)}for(let i=-5;i<=5;i+=2){const dash=new THREE.Mesh(new THREE.BoxGeometry(.1,.009,.012),new THREE.MeshBasicMaterial({color:0xfacc15}));dash.position.set(i*.1,.01,0);lab.add(dash)}const car=new THREE.Group();car.position.set(-.6,.012,0);lab.add(car);let carScale=1,ready=false;document.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>{carScale=+b.dataset.s;car.scale.setScalar(carScale);document.querySelectorAll('[data-s]').forEach(x=>x.classList.toggle('active',x===b))});new GLTFLoader().load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CarConcept/glTF-Binary/CarConcept.glb',g=>{const m=g.scene;m.traverse(o=>{if(o.isMesh){o.castShadow=false;o.receiveShadow=false}});let b=new THREE.Box3().setFromObject(m),z=b.getSize(new THREE.Vector3()),s=.22/Math.max(z.x,z.y,z.z);m.scale.setScalar(s);b.setFromObject(m);m.position.y=-b.min.y;m.rotation.y=-Math.PI/2;car.add(m);ready=true;statusEl.textContent='Listo. Pulsa START AR, mira la mesa y toca para colocar el carril.'},undefined,()=>statusEl.textContent='No se pudo cargar el vehículo.');function panel(title,color){const cv=document.createElement('canvas');cv.width=320;cv.height=180;const tx=new THREE.CanvasTexture(cv);const mesh=new THREE.Mesh(new THREE.PlaneGeometry(.45,.25),new THREE.MeshBasicMaterial({map:tx,transparent:true,side:THREE.DoubleSide}));mesh.rotation.x=-Math.PI/2;mesh.userData={cv,tx,title,color};lab.add(mesh);return mesh}const px=panel('Posición','#38bdf8'),pv=panel('Velocidad','#fb923c');px.position.set(-.27,.012,-.48);pv.position.set(.27,.012,-.48);function plot(mesh,t,max,fn){const{cv,tx,title,color}=mesh.userData,c=cv.getContext('2d'),w=cv.width,h=cv.height;c.fillStyle='rgba(15,23,42,.92)';c.fillRect(0,0,w,h);c.fillStyle='#fff';c.font='22px system-ui';c.fillText(title,14,28);c.strokeStyle='#94a3b8';c.lineWidth=2;c.beginPath();c.moveTo(28,38);c.lineTo(28,h-22);c.lineTo(w-12,h-22);c.stroke();c.strokeStyle=color;c.lineWidth=5;c.beginPath();for(let i=0;i<61;i++){let q=t*i/60,x=28+(w-44)*i/60,y=h-22-(h-68)*fn(q)/max;i?c.lineTo(x,y):c.moveTo(x,y)}c.stroke();tx.needsUpdate=true}plot(px,0,35,q=>q+.25*q*q);plot(pv,0,6,q=>1+.5*q);const controller=renderer.xr.getController(0);scene.add(controller);let source,requested=false,placed=false,running=false,start=0,elapsed=0;controller.addEventListener('select',()=>{if(!reticle.visible||!ready)return;reticle.matrix.decompose(lab.position,lab.quaternion,new THREE.Vector3());lab.visible=true;placed=true;running=false;elapsed=0;motion.hidden=false;reticle.visible=false;statusEl.textContent='Carril colocado. Mira desde arriba y pulsa Iniciar.'});play.onclick=()=>{if(!placed)return;start=performance.now()-elapsed;running=true;statusEl.textContent='Simulación en movimiento.'};pause.onclick=()=>{if(!running)return;elapsed=performance.now()-start;running=false;statusEl.textContent='Simulación detenida.'};replace.onclick=()=>{lab.visible=false;placed=false;running=false;elapsed=0;motion.hidden=true;statusEl.textContent='Toca otra zona de la mesa para reubicar el carril.'};renderer.setAnimationLoop((now,frame)=>{if(frame){let session=renderer.xr.getSession(),ref=renderer.xr.getReferenceSpace();if(!requested){session.requestReferenceSpace('viewer').then(s=>session.requestHitTestSource({space:s})).then(s=>source=s);session.addEventListener('end',()=>{requested=false;source=null});requested=true}if(source&&!placed){let hits=frame.getHitTestResults(source);reticle.visible=!!hits.length;if(hits.length)reticle.matrix.fromArray(hits[0].getPose(ref).transform.matrix)}}if(placed){let ms=running?performance.now()-start:elapsed,t=(ms/1000)%10,x=t+.25*t*t,p=Math.min(1,x/35);car.position.x=-.6+1.2*p;plot(px,t,35,q=>q+.25*q*q);plot(pv,t,6,q=>1+.5*q)}renderer.render(scene,camera)});addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)})</script></body></html>
