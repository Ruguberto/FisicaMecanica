<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Carrito MRUA en WebXR</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#101827;font-family:system-ui,sans-serif}.top{position:fixed;z-index:2;top:10px;left:10px;right:10px;padding:9px;border-radius:10px;background:rgba(15,23,42,.84);color:#fff;text-align:center;font-size:13px}.sizes{display:flex;justify-content:center;gap:6px;margin-top:7px}.sizes button{padding:6px 10px;border:1px solid #94a3b8;border-radius:7px;background:#1e293b;color:#fff}.sizes button.active{background:#38bdf8;color:#082f49}.graphs{position:fixed;z-index:2;left:8px;right:8px;bottom:8px;display:grid;grid-template-columns:1fr 1fr;gap:6px}.graph{padding:5px;border-radius:8px;background:rgba(15,23,42,.82);color:#fff;text-align:center;font-size:11px}.graph canvas{width:100%;height:80px;display:block}canvas{display:block}</style><script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"}}</script></head><body><div class="top" id="overlay"><div id="status">Pulsa START AR, busca una superficie y toca para colocar.</div><div class="sizes"><button data-size=".45" class="active">Pequeño</button><button data-size=".7">Mediano</button><button data-size="1">Grande</button></div></div><div class="graphs"><div class="graph">Posición<canvas id="gx" width="240" height="100"></canvas></div><div class="graph">Velocidad<canvas id="gv" width="240" height="100"></canvas></div></div><script type="module">
import * as THREE from'three';import{ARButton}from'three/addons/webxr/ARButton.js';import{GLTFLoader}from'three/addons/loaders/GLTFLoader.js';const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.01,20),renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});renderer.setPixelRatio(devicePixelRatio);renderer.setSize(innerWidth,innerHeight);renderer.xr.enabled=true;renderer.shadowMap.enabled=false;document.body.appendChild(renderer.domElement);document.body.appendChild(ARButton.createButton(renderer,{requiredFeatures:['hit-test'],optionalFeatures:['dom-overlay'],domOverlay:{root:document.body}}));scene.add(new THREE.HemisphereLight(0xffffff,0x555555,3));const reticle=new THREE.Mesh(new THREE.RingGeometry(.06,.08,32).rotateX(-Math.PI/2),new THREE.MeshBasicMaterial({color:0x38bdf8}));reticle.matrixAutoUpdate=false;reticle.visible=false;scene.add(reticle);const car=new THREE.Group();car.visible=false;scene.add(car);let chosen=.45;document.querySelectorAll('[data-size]').forEach(b=>b.onclick=()=>{chosen=Number(b.dataset.size);document.querySelectorAll('[data-size]').forEach(x=>x.classList.toggle('active',x===b));car.scale.setScalar(chosen)});new GLTFLoader().load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/ToyCar/glTF-Binary/ToyCar.glb',g=>{const model=g.scene;model.traverse(o=>{if(o.isMesh){o.castShadow=false;o.receiveShadow=false;if(/shadow|ground/i.test(o.name))o.visible=false}});let box=new THREE.Box3().setFromObject(model),size=box.getSize(new THREE.Vector3()),s=.34/Math.max(size.x,size.y,size.z);model.scale.setScalar(s);box.setFromObject(model);model.position.y=-box.min.y;model.rotation.y=Math.PI/2;car.add(model);car.scale.setScalar(chosen)},undefined,()=>status.textContent='No se pudo cargar el modelo.');const controller=renderer.xr.getController(0);scene.add(controller);let source,requested=false,placed=false,start=0,base=new THREE.Vector3(),quat=new THREE.Quaternion();controller.addEventListener('select',()=>{if(!reticle.visible||!car.children.length)return;reticle.matrix.decompose(base,quat,new THREE.Vector3());car.position.copy(base);car.quaternion.copy(quat);car.visible=true;placed=true;start=performance.now();status.textContent='Carrito colocado y en movimiento.'});function graph(canvas,t,max,fn,color){const c=canvas.getContext('2d'),w=canvas.width,h=canvas.height;c.clearRect(0,0,w,h);c.strokeStyle='#64748b';c.beginPath();c.moveTo(20,8);c.lineTo(20,h-14);c.lineTo(w-5,h-14);c.stroke();c.strokeStyle=color;c.lineWidth=3;c.beginPath();for(let i=0;i<=60;i++){const q=t*i/60,y=fn(q),px=20+(w-26)*i/60,py=h-14-(h-25)*y/max;i?c.lineTo(px,py):c.moveTo(px,py)}c.stroke()}renderer.setAnimationLoop((time,frame)=>{if(frame){const session=renderer.xr.getSession(),ref=renderer.xr.getReferenceSpace();if(!requested){session.requestReferenceSpace('viewer').then(s=>session.requestHitTestSource({space:s})).then(s=>source=s);session.addEventListener('end',()=>{requested=false;source=null});requested=true}if(source){const hits=frame.getHitTestResults(source);reticle.visible=hits.length>0;if(hits.length)reticle.matrix.fromArray(hits[0].getPose(ref).transform.matrix)}}if(placed){const t=((performance.now()-start)/1000)%10,x=t+.25*t*t,v=1+.5*t,o=new THREE.Vector3(Math.min(1.3,x*.065),0,0).applyQuaternion(quat);car.position.copy(base).add(o);graph(gx,t,35,q=>q+.25*q*q,'#38bdf8');graph(gv,t,6,q=>1+.5*q,'#fb923c')}renderer.render(scene,camera)});addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)})</script></body></html>
