<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Carrito realista en WebXR</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#101827;font-family:system-ui,sans-serif}.status{position:fixed;z-index:2;top:12px;left:12px;right:12px;padding:10px;border-radius:10px;background:rgba(15,23,42,.84);color:#fff;text-align:center;font-size:14px}canvas{display:block}</style><script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"}}</script></head><body><div class="status" id="overlay">Pulsa START AR, busca una superficie y toca para colocar el carrito.</div><script type="module">
import * as THREE from 'three';import{ARButton}from'three/addons/webxr/ARButton.js';import{GLTFLoader}from'three/addons/loaders/GLTFLoader.js';const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.01,20),renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});renderer.setPixelRatio(devicePixelRatio);renderer.setSize(innerWidth,innerHeight);renderer.xr.enabled=true;document.body.appendChild(renderer.domElement);document.body.appendChild(ARButton.createButton(renderer,{requiredFeatures:['hit-test'],optionalFeatures:['dom-overlay'],domOverlay:{root:document.getElementById('overlay')}}));scene.add(new THREE.HemisphereLight(0xffffff,0x444444,3));const reticle=new THREE.Mesh(new THREE.RingGeometry(.08,.105,32).rotateX(-Math.PI/2),new THREE.MeshBasicMaterial({color:0x38bdf8}));reticle.matrixAutoUpdate=false;reticle.visible=false;scene.add(reticle);const car=new THREE.Group();car.visible=false;scene.add(car);new GLTFLoader().load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/ToyCar/glTF-Binary/ToyCar.glb',g=>{const model=g.scene,box=new THREE.Box3().setFromObject(model),size=box.getSize(new THREE.Vector3()),scale=.38/Math.max(size.x,size.y,size.z);model.scale.setScalar(scale);box.setFromObject(model);model.position.y=-box.min.y;model.rotation.y=Math.PI/2;car.add(model);document.getElementById('overlay').textContent='Pulsa START AR, busca una superficie y toca para colocar el carrito.'},undefined,()=>document.getElementById('overlay').textContent='No se pudo cargar el modelo del carrito.');const controller=renderer.xr.getController(0);scene.add(controller);let source=null,requested=false,placed=false,start=0,base=new THREE.Vector3(),quat=new THREE.Quaternion();controller.addEventListener('select',()=>{if(!reticle.visible||!car.children.length)return;reticle.matrix.decompose(base,quat,new THREE.Vector3());car.position.copy(base);car.quaternion.copy(quat);car.visible=true;placed=true;start=performance.now();document.getElementById('overlay').textContent='Carrito colocado y en movimiento.'});renderer.setAnimationLoop((time,frame)=>{if(frame){const session=renderer.xr.getSession(),ref=renderer.xr.getReferenceSpace();if(!requested){session.requestReferenceSpace('viewer').then(s=>session.requestHitTestSource({space:s})).then(s=>source=s);session.addEventListener('end',()=>{requested=false;source=null});requested=true}if(source){const hits=frame.getHitTestResults(source);reticle.visible=hits.length>0;if(hits.length)reticle.matrix.fromArray(hits[0].getPose(ref).transform.matrix)}}if(placed){const t=((performance.now()-start)/1000)%10,m=t+.25*t*t,o=new THREE.Vector3(Math.min(1.5,m*.08),0,0).applyQuaternion(quat);car.position.copy(base).add(o)}renderer.render(scene,camera)});addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)})</script></body></html>
