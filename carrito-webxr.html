<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Carrito MRUA en WebXR</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#101827;font-family:system-ui,sans-serif}.panel{position:fixed;z-index:2;top:12px;left:12px;right:12px;display:flex;gap:8px;flex-wrap:wrap;padding:10px;border-radius:10px;background:rgba(15,23,42,.84);color:#fff}.panel label{display:flex;align-items:center;gap:5px;font-size:13px}.panel input{width:58px;padding:6px;border:0;border-radius:5px}.status{flex:1 1 100%;text-align:center;font-size:13px}canvas{display:block}</style><script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"}}</script></head><body><div class="panel" id="overlay"><label>v₀ <input id="v0" type="number" value="1" step="any"></label><label>a <input id="a" type="number" value="0.5" step="any"></label><label>Tiempo <input id="duration" type="number" value="10" min="1"></label><div class="status" id="status">Pulsa START AR, busca una superficie y toca para colocar.</div></div><script type="module">import * as THREE from'tree';</script><script type="module">
import * as THREE from 'three';import{ARButton}from'three/addons/webxr/ARButton.js';const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.01,20),renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});renderer.setPixelRatio(devicePixelRatio);renderer.setSize(innerWidth,innerHeight);renderer.xr.enabled=true;document.body.appendChild(renderer.domElement);document.body.appendChild(ARButton.createButton(renderer,{requiredFeatures:['hit-test'],optionalFeatures:['dom-overlay'],domOverlay:{root:document.getElementById('overlay')}}));scene.add(new THREE.HemisphereLight(0xffffff,0x444444,2.4));const reticle=new THREE.Mesh(new THREE.RingGeometry(.08,.105,32).rotateX(-Math.PI/2),new THREE.MeshBasicMaterial({color:0x38bdf8}));reticle.matrixAutoUpdate=false;reticle.visible=false;scene.add(reticle);const car=new THREE.Group(),body=new THREE.Mesh(new THREE.BoxGeometry(.28,.10,.15),new THREE.MeshStandardMaterial({color:0xff7a21}));body.position.y=.1;car.add(body);for(const x of[-.085,.085])for(const z of[-.075,.075]){const w=new THREE.Mesh(new THREE.CylinderGeometry(.035,.035,.025,16),new THREE.MeshStandardMaterial({color:0x111111}));w.rotation.x=Math.PI/2;w.position.set(x,.055,z);car.add(w)}car.visible=false;scene.add(car);const controller=renderer.xr.getController(0);scene.add(controller);let source=null,requested=false,placed=false,start=0,base=new THREE.Vector3(),quat=new THREE.Quaternion();controller.addEventListener('select',()=>{if(!reticle.visible)return;reticle.matrix.decompose(base,quat,new THREE.Vector3());car.position.copy(base);car.quaternion.copy(quat);car.visible=true;placed=true;start=performance.now();document.getElementById('status').textContent='Carrito colocado y en movimiento.'});renderer.setAnimationLoop((time,frame)=>{if(frame){const session=renderer.xr.getSession(),ref=renderer.xr.getReferenceSpace();if(!requested){session.requestReferenceSpace('viewer').then(s=>session.requestHitTestSource({space:s})).then(s=>source=s);session.addEventListener('end',()=>{requested=false;source=null});requested=true}if(source){const hits=frame.getHitTestResults(source);reticle.visible=hits.length>0;if(hits.length)reticle.matrix.fromArray(hits[0].getPose(ref).transform.matrix)}}if(placed){const v=Number(document.getElementById('v0').value)||0,a=Number(document.getElementById('a').value)||0,d=Math.max(1,Number(document.getElementById('duration').value)||10),t=((performance.now()-start)/1000)%d,m=v*t+.5*a*t*t,o=new THREE.Vector3(Math.min(1.5,Math.max(-1.5,m*.08)),0,0).applyQuaternion(quat);car.position.copy(base).add(o)}renderer.render(scene,camera)});addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)})</script></body></html>
