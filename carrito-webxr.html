<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Laboratorio MRUA sobre mesa</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#101827;font-family:system-ui}.top{position:fixed;z-index:3;top:6px;left:6px;right:6px;padding:8px;border-radius:9px;background:#0f172ae8;color:#fff;text-align:center;font-size:12px}.params{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:6px}.params label{display:grid;gap:2px}.params input{min-width:0;width:100%;box-sizing:border-box;padding:5px;border:0;border-radius:5px}.row{margin-top:6px}.row button{padding:6px 9px;margin:2px;border:1px solid #94a3b8;border-radius:6px;background:#1e293b;color:#fff}.row button.active,.row button.go{background:#38bdf8;color:#082f49}[hidden]{display:none}</style><script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"}}</script></head><body><div class="top"><div id="status">Cargando laboratorio…</div><div class="params"><label>Tiempo (s)<input id="duration" type="number" min="1" value="10"></label><label>x₀ (m)<input id="x0" type="number" step="any" value="0"></label><label>v₀ (m/s)<input id="v0" type="number" step="any" value="1"></label><label>a (m/s²)<input id="acc" type="number" step="any" value="0.5"></label></div><div class="row"><button data-s=".65">Pequeño</button><button data-s="1" class="active">Mediano</button><button data-s="1.4">Grande</button></div><div class="row" id="motion" hidden><button id="play" class="go">Iniciar</button><button id="pause">Detener</button><button id="replace">Reubicar</button></div></div><script type="module">
import*as THREE from'three';import{ARButton}from'three/addons/webxr/ARButton.js';import{GLTFLoader}from'three/addons/loaders/GLTFLoader.js';const $=id=>document.getElementById(id),statusEl=$('status'),motion=$('motion'),play=$('play'),pause=$('pause'),replace=$('replace'),scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.01,20),renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(devicePixelRatio);renderer.xr.enabled=true;renderer.shadowMap.enabled=false;document.body.appendChild(renderer.domElement);document.body.appendChild(ARButton.createButton(renderer,{requiredFeatures:['hit-test'],optionalFeatures:['dom-overlay'],domOverlay:{root:document.body}}));scene.add(new THREE.HemisphereLight(0xffffff,0x555555,3));const reticle=new THREE.Mesh(new THREE.RingGeometry(.08,.105,32).rotateX(-Math.PI/2),new THREE.MeshBasicMaterial({color:0x38bdf8}));reticle.matrixAutoUpdate=false;reticle.visible=false;scene.add(reticle);const lab=new THREE.Group();lab.visible=false;scene.add(lab);const road=new THREE.Mesh(new THREE.PlaneGeometry(1.4,.38),new THREE.MeshBasicMaterial({color:0x27313c,transparent:true,opacity:.88,side:THREE.DoubleSide}));road.rotation.x=-Math.PI/2;road.position.y=.002;lab.add(road);for(const z of[-.17,.17]){const e=new THREE.Mesh(new THREE.BoxGeometry(1.4,.008,.018),new THREE.MeshBasicMaterial({color:0xffffff}));e.position.set(0,.008,z);lab.add(e)}for(let i=-5;i<=5;i+=2){const d=new THREE.Mesh(new THREE.BoxGeometry(.1,.009,.012),new THREE.MeshBasicMaterial({color:0xfacc15}));d.position.set(i*.1,.01,0);lab.add(d)}const car=new THREE.Group();car.position.set(-.6,.012,0);lab.add(car);let ready=false;document.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>{car.scale.setScalar(+b.dataset.s);document.querySelectorAll('[data-s]').forEach(x=>x.classList.toggle('active',x===b))});new GLTFLoader().load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CarConcept/glTF-Binary/CarConcept.glb',g=>{const m=g.scene;m.traverse(o=>{if(o.isMesh){o.castShadow=false;o.receiveShadow=false}});let b=new THREE.Box3().setFromObject(m),z=b.getSize(new THREE.Vector3()),s=.22/Math.max(z.x,z.y,z.z);m.scale.setScalar(s);b.setFromObject(m);m.position.y=-b.min.y;m.rotation.y=-Math.PI/2;car.add(m);ready=true;statusEl.textContent='Listo. Pulsa START AR, mira la mesa y toca para colocar.'},undefined,()=>statusEl.textContent='No se pudo cargar el vehículo.');function graphSprite(title,color){const cv=document.createElement('canvas');cv.width=300;cv.height=170;const tx=new THREE.CanvasTexture(cv),sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tx,transparent:true,depthTest:false}));sp.scale.set(.34,.19,1);sp.userData={cv,tx,title,color};car.add(sp);return sp}const px=graphSprite('Posición','#38bdf8'),pv=graphSprite('Velocidad','#fb923c');px.position.set(-.18,.34,0);pv.position.set(.18,.34,0);function plot(sp,t,d,max,fn){const{cv,tx,title,color}=sp.userData,c=cv.getContext('2d'),w=cv.width,h=cv.height;c.fillStyle='rgba(15,23,42,.92)';c.fillRect(0,0,w,h);c.fillStyle='#fff';c.font='21px system-ui';c.fillText(title,12,25);c.strokeStyle='#94a3b8';c.lineWidth=2;c.beginPath();c.moveTo(27,34);c.lineTo(27,h-20);c.lineTo(w-10,h-20);c.stroke();c.strokeStyle=color;c.lineWidth=5;c.beginPath();for(let i=0;i<61;i++){let q=t*i/60,x=27+(w-42)*i/60,y=h-20-(h-61)*fn(q)/max;i?c.lineTo(x,y):c.moveTo(x,y)}c.stroke();tx.needsUpdate=true}const controller=renderer.xr.getController(0);scene.add(controller);let source,requested=false,placed=false,running=false,start=0,elapsed=0;controller.addEventListener('select',()=>{if(!reticle.visible||!ready)return;reticle.matrix.decompose(lab.position,lab.quaternion,new THREE.Vector3());lab.visible=true;placed=true;running=false;elapsed=0;motion.hidden=false;statusEl.textContent='Carril colocado. Pulsa Iniciar.'});play.onclick=()=>{if(!placed)return;start=performance.now()-elapsed;running=true;statusEl.textContent='Simulación en movimiento.'};pause.onclick=()=>{if(!running)return;elapsed=performance.now()-start;running=false;statusEl.textContent='Simulación detenida.'};replace.onclick=()=>{lab.visible=false;placed=false;running=false;elapsed=0;motion.hidden=true;statusEl.textContent='Toca otra zona para reubicar el laboratorio.'};renderer.setAnimationLoop((now,frame)=>{if(frame){let session=renderer.xr.getSession(),ref=renderer.xr.getReferenceSpace();if(!requested){session.requestReferenceSpace('viewer').then(s=>session.requestHitTestSource({space:s})).then(s=>source=s);session.addEventListener('end',()=>{requested=false;source=null});requested=true}if(source&&!placed){let hits=frame.getHitTestResults(source);reticle.visible=!!hits.length;if(hits.length)reticle.matrix.fromArray(hits[0].getPose(ref).transform.matrix)}}if(placed){const d=Math.max(1,+$('duration').value||10),x0=+$('x0').value||0,v0=+$('v0').value||0,a=+$('acc').value||0,ms=running?performance.now()-start:elapsed,t=(ms/1000)%d,x=x0+v0*t+.5*a*t*t,end=x0+v0*d+.5*a*d*d,span=Math.max(1,Math.abs(end-x0)),p=Math.min(1,Math.abs(x-x0)/span),v=v0+a*t,vmax=Math.max(1,Math.abs(v0),Math.abs(v0+a*d));car.position.x=-.6+1.2*p;plot(px,t,d,Math.max(1,Math.abs(end)),q=>Math.abs(x0+v0*q+.5*a*q*q));plot(pv,t,d,vmax,q=>Math.abs(v0+a*q))}renderer.render(scene,camera)});addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)})</script></body></html>
