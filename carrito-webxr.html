<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Carrito MRUA WebXR</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#101827;font-family:system-ui}.top{position:fixed;z-index:2;top:8px;left:8px;right:8px;padding:9px;border-radius:9px;background:#0f172ad9;color:white;text-align:center;font-size:13px}.sizes{margin-top:7px}.sizes button{padding:6px 9px;margin:0 2px;border:1px solid #94a3b8;border-radius:6px;background:#1e293b;color:white}.sizes .active{background:#38bdf8;color:#082f49}.graphs{position:fixed;z-index:2;left:6px;right:6px;bottom:6px;display:grid;grid-template-columns:1fr 1fr;gap:5px}.graph{padding:4px;border-radius:7px;background:#0f172ad9;color:white;text-align:center;font-size:11px}.graph canvas{width:100%;height:70px}</style><script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"}}</script></head><body><div class="top"><div id="status">Pulsa START AR, busca una superficie y toca para colocar.</div><div class="sizes"><button data-s=".65">Pequeño</button><button data-s="1" class="active">Mediano</button><button data-s="1.4">Grande</button></div></div><div class="graphs"><div class="graph">Posición<canvas id="gx" width="240" height="90"></canvas></div><div class="graph">Velocidad<canvas id="gv" width="240" height="90"></canvas></div></div><script type="module">
import*as THREE from'three';import{ARButton}from'three/addons/webxr/ARButton.js';import{GLTFLoader}from'three/addons/loaders/GLTFLoader.js';const statusEl=document.getElementById('status'),gx=document.getElementById('gx'),gv=document.getElementById('gv'),scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.01,20),renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(devicePixelRatio);renderer.xr.enabled=true;renderer.shadowMap.enabled=false;document.body.appendChild(renderer.domElement);document.body.appendChild(ARButton.createButton(renderer,{requiredFeatures:['hit-test'],optionalFeatures:['dom-overlay'],domOverlay:{root:document.body}}));scene.add(new THREE.HemisphereLight(0xffffff,0x555555,3));const reticle=new THREE.Mesh(new THREE.RingGeometry(.06,.08,32).rotateX(-Math.PI/2),new THREE.MeshBasicMaterial({color:0x38bdf8}));reticle.matrixAutoUpdate=false;reticle.visible=false;scene.add(reticle);const car=new THREE.Group();car.visible=false;scene.add(car);let scale=1,ready=false;document.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>{scale=+b.dataset.s;car.scale.setScalar(scale);document.querySelectorAll('[data-s]').forEach(x=>x.classList.toggle('active',x===b))});function fallback(){const body=new THREE.Mesh(new THREE.BoxGeometry(.28,.1,.15),new THREE.MeshStandardMaterial({color:0xf97316}));body.position.y=.08;car.add(body);ready=true;statusEl.textContent='Modelo simplificado listo. Inicia AR y toca una superficie.'}new GLTFLoader().load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/ToyCar/glTF-Binary/ToyCar.glb',g=>{const m=g.scene;m.traverse(o=>{if(o.isMesh){o.castShadow=false;o.receiveShadow=false}});let b=new THREE.Box3().setFromObject(m),z=b.getSize(new THREE.Vector3()),s=.32/Math.max(z.x,z.y,z.z);m.scale.setScalar(s);b.setFromObject(m);m.position.y=-b.min.y;m.rotation.y=Math.PI/2;car.add(m);car.scale.setScalar(scale);ready=true;statusEl.textContent='Modelo listo. Inicia AR y toca una superficie.'},undefined,fallback);const controller=renderer.xr.getController(0);scene.add(controller);let source,requested=false,placed=false,start=0,base=new THREE.Vector3(),quat=new THREE.Quaternion();controller.addEventListener('select',()=>{if(!reticle.visible||!ready)return;reticle.matrix.decompose(base,quat,new THREE.Vector3());car.position.copy(base);car.quaternion.copy(quat);car.visible=true;placed=true;start=performance.now();statusEl.textContent='Carrito colocado y en movimiento.'});function plot(cv,t,max,fn,color){const c=cv.getContext('2d'),w=cv.width,h=cv.height;c.clearRect(0,0,w,h);c.strokeStyle='#64748b';c.beginPath();c.moveTo(18,5);c.lineTo(18,h-12);c.lineTo(w-4,h-12);c.stroke();c.strokeStyle=color;c.lineWidth=3;c.beginPath();for(let i=0;i<61;i++){let q=t*i/60,px=18+(w-23)*i/60,py=h-12-(h-20)*fn(q)/max;i?c.lineTo(px,py):c.moveTo(px,py)}c.stroke()}renderer.setAnimationLoop((now,frame)=>{if(frame){let session=renderer.xr.getSession(),ref=renderer.xr.getReferenceSpace();if(!requested){session.requestReferenceSpace('viewer').then(s=>session.requestHitTestSource({space:s})).then(s=>source=s);session.addEventListener('end',()=>{requested=false;source=null});requested=true}if(source){let hits=frame.getHitTestResults(source);reticle.visible=!!hits.length;if(hits.length)reticle.matrix.fromArray(hits[0].getPose(ref).transform.matrix)}}if(placed){let t=((performance.now()-start)/1000)%10,x=t+.25*t*t,o=new THREE.Vector3(Math.min(1.3,x*.065),0,0).applyQuaternion(quat);car.position.copy(base).add(o);plot(gx,t,35,q=>q+.25*q*q,'#38bdf8');plot(gv,t,6,q=>1+.5*q,'#fb923c')}renderer.render(scene,camera)});addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)})</script></body></html>
