<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>MRUA en realidad aumentada</title>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.6.0/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.7/aframe/build/aframe-ar.min.js"></script>
  <style>
    *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#000;font-family:system-ui,sans-serif}a-scene{position:fixed!important;inset:0;width:100%!important;height:100%!important}.message{position:fixed;z-index:10;left:12px;right:12px;bottom:max(12px,env(safe-area-inset-bottom));padding:10px 12px;border-radius:10px;background:rgba(15,23,42,.86);color:#fff;text-align:center;font-size:14px;pointer-events:none}.start{position:fixed;z-index:12;left:50%;top:50%;transform:translate(-50%,-50%);padding:14px 20px;border:0;border-radius:12px;background:#fff;color:#111;font:600 16px system-ui;box-shadow:0 4px 20px rgba(0,0,0,.35)}.start[hidden]{display:none}
  </style>
</head>
<body>
  <button class="start" id="start-camera" type="button">Activar cámara</button>
  <div class="message" id="ar-message">Permite el acceso a la cámara y apunta al marcador Hiro.</div>
  <a-scene embedded vr-mode-ui="enabled:false" renderer="antialias:true;alpha:true" arjs="sourceType:webcam;debugUIEnabled:false;detectionMode:mono;">
    <a-marker id="ar-marker" preset="hiro">
      <a-plane position="0 0 0" rotation="-90 0 0" width="3.8" height="2.1" color="#10213b" opacity="0.92"></a-plane>
      <a-text value="MRUA" position="-1.72 0.03 -0.82" rotation="-90 0 0" color="#ffffff" width="3.5"></a-text>
      <a-text id="ar-values" value="t=0.00 s | x=0.00 m | v=1.00 m/s" position="-1.72 0.03 -0.52" rotation="-90 0 0" color="#7dd3fc" width="3.15"></a-text>
      <a-box id="ar-car" position="-1.45 0.20 0.25" width="0.48" height="0.22" depth="0.28" color="#ff8a3d"></a-box>
      <a-cylinder position="-1.58 0.10 0.10" rotation="90 0 0" radius="0.08" height="0.32" color="#111111"></a-cylinder>
      <a-cylinder position="-1.32 0.10 0.10" rotation="90 0 0" radius="0.08" height="0.32" color="#111111"></a-cylinder>
      <a-plane position="0 0.025 0.25" rotation="-90 0 0" width="3.2" height="0.035" color="#ffffff"></a-plane>
      <a-text value="x(t)" position="1.38 0.03 0.43" rotation="-90 0 0" color="#ffffff" width="1.2"></a-text>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
  <script>
    (()=>{const marker=document.getElementById('ar-marker'),car=document.getElementById('ar-car'),values=document.getElementById('ar-values'),message=document.getElementById('ar-message'),startButton=document.getElementById('start-camera');const x0=0,v0=1,a=.5,duration=10;let running=false,startAt=0,frame=0;
      function draw(now){if(!running)return;const t=((now-startAt)/1000)%duration,x=x0+v0*t+.5*a*t*t,v=v0+a*t,end=x0+v0*duration+.5*a*duration*duration,px=-1.45+2.9*((x-x0)/(end-x0));values.setAttribute('value',`t=${t.toFixed(2)} s | x=${x.toFixed(2)} m | v=${v.toFixed(2)} m/s`);car.setAttribute('position',`${px} 0.20 0.25`);frame=requestAnimationFrame(draw)}
      marker.addEventListener('markerFound',()=>{message.textContent='MRUA montado sobre el tablero.';if(!running){running=true;startAt=performance.now();frame=requestAnimationFrame(draw)}});marker.addEventListener('markerLost',()=>{message.textContent='Vuelve a enfocar el marcador Hiro completo.';running=false;cancelAnimationFrame(frame)});
      window.addEventListener('camera-init',()=>{startButton.hidden=true;message.textContent='Cámara activa. Apunta al marcador Hiro.'});
      window.addEventListener('camera-error',()=>{startButton.hidden=false;message.textContent='Pulsa Activar cámara y acepta el permiso.'});
      startButton.addEventListener('click',async()=>{try{message.textContent='Solicitando permiso de cámara…';const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});stream.getTracks().forEach(track=>track.stop());startButton.hidden=true;location.reload()}catch(error){message.textContent='Chrome bloqueó la cámara. Habilítala en los permisos del sitio.'}});
      setTimeout(()=>{const video=document.querySelector('video');if(video&&video.srcObject){startButton.hidden=true}else{startButton.hidden=false}},3500);
    })();
  </script>
</body>
</html>
