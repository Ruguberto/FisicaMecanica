<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Iniciar MRUA en realidad aumentada</title>
  <style>*{box-sizing:border-box}html,body{width:100%;min-height:100%;margin:0;background:#05080f;color:#fff;font-family:system-ui,sans-serif}.wrap{min-height:100vh;display:grid;place-items:center;padding:22px}.card{width:min(100%,390px);padding:22px;border:1px solid #334155;border-radius:16px;background:#111827}.grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}label{display:grid;gap:6px;color:#cbd5e1;font-size:14px}input{width:100%;padding:11px;border:1px solid #475569;border-radius:9px;background:#0f172a;color:#fff;font:16px system-ui}.start{width:100%;margin-top:18px;padding:14px;border:0;border-radius:10px;background:#fff;color:#111;font-weight:700;font-size:16px}h1{margin:0 0 16px;font-size:21px}@media(max-width:360px){.grid{grid-template-columns:1fr}}</style>
</head>
<body><main class="wrap"><form class="card" id="mrua-form"><h1>Parámetros del MRUA</h1><div class="grid"><label>Posición inicial (m)<input id="x0" type="number" step="any" value="0" required></label><label>Velocidad inicial (m/s)<input id="v0" type="number" step="any" value="1" required></label><label>Aceleración (m/s²)<input id="a" type="number" step="any" value="0.5" required></label><label>Duración (s)<input id="duration" type="number" min="1" step="any" value="10" required></label></div><button class="start" type="submit">Activar cámara y AR</button></form></main><script>document.getElementById('mrua-form').addEventListener('submit',event=>{event.preventDefault();const q=new URLSearchParams({x0:document.getElementById('x0').value,v0:document.getElementById('v0').value,a:document.getElementById('a').value,duration:document.getElementById('duration').value});location.href='ar-sesion.html?'+q})</script></body>
</html>
