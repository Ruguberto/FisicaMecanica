<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>MRUA sobre el tablero</title>
  <style>
    *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#05070b;font-family:system-ui,sans-serif}video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover}.start{position:fixed;z-index:20;left:50%;top:50%;transform:translate(-50%,-50%);padding:15px 22px;border:0;border-radius:12px;background:#fff;color:#111;font:600 16px system-ui}.start[hidden]{display:none}.hint{position:fixed;z-index:15;left:12px;right:12px;bottom:max(12px,env(safe-area-inset-bottom));padding:10px;border-radius:10px;background:rgba(15,23,42,.85);color:#fff;text-align:center;font-size:14px;pointer-events:none}.lab{position:fixed;z-index:10;left:50%;top:62%;width:min(86vw,430px);height:150px;transform:translate(-50%,-50%);border:2px solid rgba(125,211,252,.9);border-radius:14px;background:rgba(15,33,59,.72);color:#fff;box-shadow:0 10px 35px rgba(0,0,0,.35);touch-action:none}.readout{padding:10px 12px;color:#7dd3fc;font:600 14px ui-monospace,monospace}.track{position:absolute;left:24px;right:24px;bottom:35px;height:3px;background:#fff}.car{position:absolute;left:24px;bottom:40px;width:48px;height:24px;border-radius:7px 10px 4px 4px;background:#ff8a3d;transform:translateX(0)}.car:before,.car:after{content:"";position:absolute;bottom:-7px;width:13px;height:13px;border-radius:50%;background:#111;border:2px solid #bbb}.car:before{left:5px}.car:after{right:5px}.label{position:absolute;right:10px;bottom:8px;font-size:12px;color:#fff}
  </style>
</head>
<body>
  <video id="camera" autoplay playsinline muted></video>
  <button class="start" id="start" type="button">Activar cámara</button>
  <section class="lab" id="lab" hidden aria-label="Simulación MRUA colocada sobre la cámara">
    <div class="readout" id="readout">t=0.00 s · x=0.00 m · v=1.00 m/s</div><div class="track"></div><div class="car" id="car"></div><div class="label">MRUA · toca para colocar</div>
  </section>
  <div class="hint" id="hint">Pulsa “Activar cámara” y acepta el permiso.</div>
  <script>
    (()=>{const video=document.getElementById('camera'),start=document.getElementById('start'),lab=document.getElementById('lab'),car=document.getElementById('car'),readout=document.getElementById('readout'),hint=document.getElementById('hint');let stream=null,startedAt=0,frame=0;const x0=0,v0=1,a=.5,duration=10;
      function animate(now){const t=((now-startedAt)/1000)%duration,x=x0+v0*t+.5*a*t*t,v=v0+a*t,end=x0+v0*duration+.5*a*duration*duration,travel=Math.max(0,Math.min(1,(x-x0)/(end-x0)));car.style.transform=`translateX(${travel*(lab.clientWidth-96)}px)`;readout.textContent=`t=${t.toFixed(2)} s · x=${x.toFixed(2)} m · v=${v.toFixed(2)} m/s`;frame=requestAnimationFrame(animate)}
      async function openCamera(){start.disabled=true;hint.textContent='Abriendo cámara…';try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=stream;await video.play();start.hidden=true;lab.hidden=false;hint.textContent='Cámara activa. Toca el tablero para colocar la simulación.';startedAt=performance.now();cancelAnimationFrame(frame);frame=requestAnimationFrame(animate)}catch(error){start.disabled=false;hint.textContent='No se pudo abrir la cámara. Permite el acceso en Chrome e inténtalo otra vez.'}}
      start.addEventListener('click',openCamera);document.addEventListener('pointerdown',event=>{if(lab.hidden||event.target===start)return;const x=Math.max(10,Math.min(innerWidth-10,event.clientX)),y=Math.max(90,Math.min(innerHeight-90,event.clientY));lab.style.left=`${x}px`;lab.style.top=`${y}px`});window.addEventListener('pagehide',()=>{stream?.getTracks().forEach(track=>track.stop());cancelAnimationFrame(frame)});
    })();
  </script>
</body>
</html>
