<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>MRUA sobre cámara</title>
  <style>*{box-sizing:border-box}body{margin:0;padding:16px;background:#07101f;color:#fff;font-family:system-ui,sans-serif}.layout{width:min(100%,900px);margin:auto;display:grid;grid-template-columns:300px 1fr;gap:16px}.card{padding:18px;border:1px solid #334155;border-radius:14px;background:#111827}.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}h1,h2{margin:0 0 14px;font-size:20px}label{display:grid;gap:5px;color:#cbd5e1;font-size:13px}input{width:100%;padding:10px;border:1px solid #475569;border-radius:8px;background:#0f172a;color:#fff;font:16px system-ui}button{width:100%;margin-top:14px;padding:13px;border:0;border-radius:9px;background:#fff;color:#111;font-weight:700;font-size:16px}.viewport{position:relative;overflow:hidden;min-height:360px;padding:0;background:#020617}.viewport video{width:100%;height:100%;min-height:360px;object-fit:cover;display:block}.overlay{position:absolute;inset:0;pointer-events:none}.data{position:absolute;left:12px;right:12px;top:12px;padding:9px;border-radius:8px;background:rgba(15,23,42,.82);text-align:center}.track{position:absolute;left:7%;right:7%;bottom:22%;height:4px;background:#fff}.car{position:absolute;left:7%;bottom:calc(22% + 5px);width:52px;height:25px;border-radius:7px 9px 4px 4px;background:#ff8a3d;transform:translateX(-50%)}.car:before,.car:after{content:'';position:absolute;bottom:-7px;width:13px;height:13px;border-radius:50%;background:#111}.car:before{left:6px}.car:after{right:6px}.status{position:absolute;left:12px;right:12px;bottom:12px;text-align:center;padding:8px;border-radius:8px;background:rgba(15,23,42,.82)}@media(max-width:700px){.layout{grid-template-columns:1fr}.viewport,.viewport video{min-height:56vh}}</style>
</head>
<body><main class="layout"><section class="card"><h1>Parámetros MRUA</h1><div class="grid"><label>Posición inicial (m)<input id="x0" type="number" step="any" value="0"></label><label>Velocidad inicial (m/s)<input id="v0" type="number" step="any" value="1"></label><label>Aceleración (m/s²)<input id="a" type="number" step="any" value="0.5"></label><label>Duración (s)<input id="duration" type="number" min="1" step="any" value="10"></label></div><button id="start" type="button">Activar cámara</button></section><section class="card viewport"><video id="camera" playsinline autoplay muted></video><div class="overlay"><div class="data" id="data">t=0.00 s · x=0.00 m · v=1.00 m/s</div><div class="track"></div><div class="car" id="car"></div><div class="status" id="status">Pulsa “Activar cámara”.</div></div></section></main><script>(()=>{const video=document.getElementById('camera'),start=document.getElementById('start'),status=document.getElementById('status'),data=document.getElementById('data'),car=document.getElementById('car');let stream,begin,frame;start.addEventListener('click',async()=>{start.disabled=true;status.textContent='Solicitando permiso de cámara…';try{if(stream)stream.getTracks().forEach(t=>t.stop());stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});video.srcObject=stream;await video.play();status.textContent='Cámara activa. Coloca el teléfono frente al tablero.';begin=performance.now();cancelAnimationFrame(frame);frame=requestAnimationFrame(draw);start.textContent='Reiniciar simulación';start.disabled=false}catch(e){status.textContent='No se pudo abrir la cámara. Permítela en Chrome.';start.disabled=false}});function draw(now){const x0=Number(document.getElementById('x0').value)||0,v0=Number(document.getElementById('v0').value)||0,a=Number(document.getElementById('a').value)||0,d=Math.max(1,Number(document.getElementById('duration').value)||10),t=((now-begin)/1000)%d,x=x0+v0*t+.5*a*t*t,v=v0+a*t,end=x0+v0*d+.5*a*d*d,span=Math.max(1,Math.abs(end-x0)),p=Math.min(1,Math.abs(x-x0)/span);car.style.left=(7+86*p)+'%';data.textContent=`t=${t.toFixed(2)} s · x=${x.toFixed(2)} m · v=${v.toFixed(2)} m/s`;frame=requestAnimationFrame(draw)}window.addEventListener('pagehide',()=>stream?.getTracks().forEach(t=>t.stop()))})()</script></body>
</html>
